<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 10: Browser dual WT channel</title>
  <link rel="stylesheet" href="/xterm.css" />
  <script src="/xterm.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #ddd; }
    .topbar { padding: 8px 12px; background: #111; border-bottom: 1px solid #333; font-size: 13px; }
    .topbar .ok { color: #4caf50; }
    .topbar .err { color: #f44336; }
    .topbar .info { color: #888; }
    .panes { display: flex; height: calc(100vh - 36px); }
    .pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; min-width: 0; }
    .pane:last-child { border-right: 0; }
    .pane h2 { margin: 0; padding: 8px 12px; background: #2a2a2a; font-size: 13px; font-weight: 600; color: #aaa; border-bottom: 1px solid #333; }
    .chat-log { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; line-height: 1.5; }
    .chat-input { display: flex; padding: 8px; border-top: 1px solid #333; background: #2a2a2a; gap: 8px; }
    .chat-input input { flex: 1; padding: 8px 10px; background: #1e1e1e; color: #ddd; border: 1px solid #444; border-radius: 4px; font-family: inherit; font-size: 13px; }
    .chat-input input:focus { outline: 1px solid #0066ff; }
    .chat-input button { padding: 8px 14px; background: #0066ff; color: white; border: 0; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }
    .ev { padding: 4px 0; border-bottom: 1px solid #2a2a2a; }
    .ev .tag { display: inline-block; min-width: 80px; padding: 1px 6px; margin-right: 8px; border-radius: 3px; font-size: 11px; }
    .ev-user .tag { background: #1976d2; color: white; }
    .ev-assistant .tag { background: #2e7d32; color: white; }
    .ev-system .tag { background: #555; color: #ccc; }
    .ev-tool .tag { background: #9c27b0; color: white; }
    .ev-result .tag { background: #455a64; color: white; }
    .ev-error .tag { background: #d32f2f; color: white; }
    .ev-raw .tag { background: #333; color: #888; }
    .ev pre { margin: 4px 0 0 88px; white-space: pre-wrap; word-break: break-word; color: #ddd; font-family: inherit; font-size: 12px; }
    #term { flex: 1; padding: 4px; background: #000; }
  </style>
</head>
<body>
  <div class="topbar">
    <span id="status" class="info">connecting…</span>
    <span class="info" id="meta"></span>
  </div>
  <div class="panes">
    <div class="pane">
      <h2>Chat (stream-json) — /wt/chat</h2>
      <div id="chatLog" class="chat-log"></div>
      <div class="chat-input">
        <input id="chatInput" placeholder="Type a prompt and press Enter…" autocomplete="off" />
        <button id="chatSend">Send</button>
      </div>
    </div>
    <div class="pane">
      <h2>Shell (PTY) — /wt/shell — runs `claude --resume &lt;chat_sid&gt;`</h2>
      <div id="term"></div>
    </div>
  </div>

<script>
const HOST = location.hostname;
const WT_PORT = '4433';

const status = document.getElementById('status');
const meta = document.getElementById('meta');
const chatLog = document.getElementById('chatLog');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

function setStatus(text, kind = 'info') {
  status.textContent = text;
  status.className = kind;
}

function appendEv(kind, label, text) {
  const div = document.createElement('div');
  div.className = `ev ev-${kind}`;
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.textContent = label;
  div.appendChild(tag);
  if (text != null) {
    const pre = document.createElement('pre');
    pre.textContent = text;
    div.appendChild(pre);
  }
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

async function fetchHash(path) {
  const r = await fetch(path, { cache: 'no-store' });
  const hex = (await r.text()).trim();
  if (!/^[0-9a-fA-F]{64}$/.test(hex)) throw new Error(`bad hash format: ${hex}`);
  const bytes = new Uint8Array(32);
  for (let i = 0; i < 32; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
  return { hex, bytes };
}

async function openWT(path, hashList) {
  const url = `https://${HOST}:${WT_PORT}${path}`;
  const wt = new WebTransport(url, {
    serverCertificateHashes: hashList.map((b) => ({ algorithm: 'sha-256', value: b })),
  });
  await wt.ready;
  const stream = await wt.createBidirectionalStream();
  return { wt, stream };
}

(async function main() {
  let chatStream, chatWriter, shellStream, shellWriter;
  try {
    setStatus('fetching cert hashes…');
    const der = await fetchHash('/cert-hash');
    const spki = await fetchHash('/cert-hash-spki');
    const hashList = [der.bytes, spki.bytes];

    setStatus('opening /wt/chat…');
    const chatConn = await openWT('/wt/chat', hashList);
    chatStream = chatConn.stream;
    chatWriter = chatStream.writable.getWriter();

    setStatus('opening /wt/shell…');
    const shellConn = await openWT('/wt/shell', hashList);
    shellStream = shellConn.stream;
    shellWriter = shellStream.writable.getWriter();

    setStatus('connected', 'ok');
    meta.textContent = `  • DER=${der.hex.slice(0, 12)}…  SPKI=${spki.hex.slice(0, 12)}…`;

    // --- Chat: parse newline-delimited JSON ---
    const decoder = new TextDecoder();
    let chatBuf = '';
    (async function chatReadLoop() {
      const reader = chatStream.readable.getReader();
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          chatBuf += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = chatBuf.indexOf('\n')) >= 0) {
            const line = chatBuf.slice(0, idx);
            chatBuf = chatBuf.slice(idx + 1);
            if (!line.trim()) continue;
            try {
              renderChatEvent(JSON.parse(line));
            } catch (e) {
              appendEv('error', 'parse', line);
            }
          }
        }
      } catch (e) {
        appendEv('error', 'read', String(e));
      }
    })();

    function renderChatEvent(ev) {
      if (ev.type === 'system' && ev.subtype === 'init') {
        appendEv('system', 'init', `model=${ev.model}  tools=${(ev.tools || []).length}  sid=${(ev.session_id || '').slice(0, 8)}…`);
      } else if (ev.type === 'system') {
        appendEv('system', ev.subtype || 'system', null);
      } else if (ev.type === 'assistant' && ev.message) {
        for (const c of ev.message.content || []) {
          if (c.type === 'text') appendEv('assistant', 'text', c.text);
          else if (c.type === 'tool_use') appendEv('tool', c.name || 'tool_use', JSON.stringify(c.input || {}, null, 2));
          else appendEv('raw', c.type, JSON.stringify(c, null, 2));
        }
      } else if (ev.type === 'result') {
        const usage = ev.usage || {};
        appendEv('result', ev.subtype || 'result', `${ev.duration_ms ?? '?'}ms  in=${usage.input_tokens ?? '?'}  out=${usage.output_tokens ?? '?'}  $${ev.total_cost_usd ?? '?'}`);
      } else {
        appendEv('raw', ev.type, JSON.stringify(ev).slice(0, 200));
      }
    }

    // --- Send chat prompt ---
    async function sendPrompt() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      appendEv('user', 'user', text);
      const msg = JSON.stringify({ type: 'user', message: { role: 'user', content: text } }) + '\n';
      await chatWriter.write(new TextEncoder().encode(msg));
    }
    chatSend.onclick = sendPrompt;
    chatInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendPrompt();
      }
    };

    // --- Shell: xterm.js ---
    const term = new Terminal({
      cols: 100,
      rows: 30,
      fontFamily: '"SF Mono", Monaco, Consolas, monospace',
      fontSize: 12,
      theme: { background: '#000', foreground: '#ddd', cursor: '#ddd' },
    });
    term.open(document.getElementById('term'));
    term.focus();

    const shellEnc = new TextEncoder();
    term.onData((data) => {
      shellWriter.write(shellEnc.encode(data));
    });

    (async function shellReadLoop() {
      const reader = shellStream.readable.getReader();
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          term.write(value);
        }
      } catch (e) {
        term.write(`\r\n\x1b[31mshell stream error: ${e}\x1b[0m\r\n`);
      }
    })();
  } catch (err) {
    setStatus(`error: ${err.message}`, 'err');
    appendEv('error', 'fatal', String(err));
  }
})();
</script>
</body>
</html>
